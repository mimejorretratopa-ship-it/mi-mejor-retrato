<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Agenda — Mi Mejor Retrato</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="agenda.css">
  <style>
    :root {
      --max-width: 800px;
    }
    body {
      display: block;
      overflow-y: auto;
      background: var(--bg);
    }
    .view-container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 40px 20px;
    }
    .view-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .view-header h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: var(--text);
    }
    .view-header p {
      color: var(--text-muted);
      font-size: 1rem;
    }
    .counters-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      background: var(--surface);
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    /* Override table styles for public view */
    .schedule-container {
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .slot-actions { display: none !important; }
    @media (max-width: 600px) {
      .view-header h1 { font-size: 1.4rem; }
      .counters-grid { flex-direction: column; align-items: center; gap: 10px; }
    }
  </style>
  
  <script src="../js/core/config.js"></script>
  <script src="../js/core/api.js"></script>
</head>
<body>

  <div class="view-container">
    <div class="view-header">
      <div class="brand" style="justify-content: center; margin-bottom: 15px;">MMR <span>Agenda</span></div>
      <h1 id="view-title">Cargando agenda...</h1>
      <p id="view-subtitle">Por favor espera un momento</p>
    </div>

    <div class="counters-grid">
      <div class="counter-item">
        <span class="counter-label">✅ ASIGNADOS</span>
        <span class="counter-value" id="count-assigned">0</span>
      </div>
      <div class="counter-item">
        <span class="counter-label">🕐 LIBRES</span>
        <span class="counter-value" id="count-free">0</span>
      </div>
    </div>

    <div class="schedule-container" id="schedule-list">
      <div style="padding:40px; text-align:center; color:var(--text-muted);">
        Obteniendo horarios actualizados...
      </div>
    </div>

    <footer style="margin-top: 40px; text-align: center; color: var(--text-muted); font-size: 0.8rem;">
      &copy; 2026 Mi Mejor Retrato · Fotografía Escolar Profesional
    </footer>
  </div>

  <script src="view.js"></script>
</body>
</html>
